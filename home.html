<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elizabethtown College Athletics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Elizabethtown College Athletics</h1>
    </div>

    <!-- NAV -->
    <div class="nav">
        <button onclick="window.location.href='home.html';" class="button-active">
            Recording
        </button>
        <button onclick="window.location.href='stats.html';">
            Stats
        </button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">

        <!-- SELECT ATHLETE + START RECORDING -->
        <div class="home-action-grid">

            <div class="action-card" id="selectAthleteCard">
                <div class="action-card-label">Select Athlete</div>
                <select id="athleteSelect" class="athlete-select">
                    <option value="">-- Loading athletes... --</option>
                </select>
            </div>

            <button id="run" class="start-btn" disabled>Start Recording</button>

        </div>

        <!-- SESSION HISTORY -->
        <div class="table-card">
            <div class="chart-title">Session History</div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Athlete</th>
                        <th>Date</th>
                        <th>Test</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="sessionTableBody">
                    <tr><td colspan="4" style="color:#999; text-align:center; padding:20px;">Loading sessions...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        const athleteSelect = document.getElementById('athleteSelect');
        const runBtn = document.getElementById('run');
        const sessionTableBody = document.getElementById('sessionTableBody');

        // --- Athlete dropdown ---
        fetch('/api/athletes')
            .then(r => r.json())
            .then(athletes => {
                athleteSelect.innerHTML = '<option value="">-- Select an Athlete --</option>';
                athletes.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a.id;
                    opt.textContent = a.name;
                    athleteSelect.appendChild(opt);
                });
            })
            .catch(() => {
                athleteSelect.innerHTML = '<option value="">-- Could not load athletes --</option>';
            });

        athleteSelect.addEventListener('change', function () {
            if (this.value) {
                runBtn.disabled = false;
                runBtn.classList.add('start-btn-ready');
            } else {
                runBtn.disabled = true;
                runBtn.classList.remove('start-btn-ready');
            }
        });

        // --- Session history ---
        fetch('/api/sessions')
            .then(r => r.json())
            .then(sessions => {
                if (!sessions.length) {
                    sessionTableBody.innerHTML = '<tr><td colspan="4" style="color:#999; text-align:center; padding:20px;">No sessions recorded yet.</td></tr>';
                    return;
                }
                sessionTableBody.innerHTML = sessions.map(s => {
                    const date = s.started_at ? s.started_at.split('T')[0] : '—';
                    const result = s.metric_value != null
                        ? `${s.metric_value.toFixed(2)} in`
                        : '—';
                    return `
                        <tr>
                            <td>${s.athlete_name}</td>
                            <td>${date}</td>
                            <td>Vertical Jump</td>
                            <td>${result}</td>
                        </tr>`;
                }).join('');
            })
            .catch(() => {
                sessionTableBody.innerHTML = '<tr><td colspan="4" style="color:#999; text-align:center; padding:20px;">Could not load sessions.</td></tr>';
            });
    </script>

</body>
</html>
